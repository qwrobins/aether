name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [created]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag and test
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate semantic version tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag ${tag} is not a supported semantic version tag" >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [[ "${tag}" != "${expected_tag}" ]]; then
            echo "Tag ${tag} does not match package.json version ${package_version}" >&2
            exit 1
          fi

          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          if [[ "${package_version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    name: Build ${{ matrix.label }} release assets
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            label: Linux
            artifact_glob: '*.AppImage'
          - runner: macos-14
            platform: macos
            label: macOS
            artifact_glob: '*.dmg'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

      - name: Build distributables
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make

      - name: Clean up keychain
        if: matrix.platform == 'macos' && always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          count=0
          while IFS= read -r -d '' file; do
            cp "$file" release-assets/
            count=$((count + 1))
          done < <(find out/make -name '${{ matrix.artifact_glob }}' -print0)

          if [[ $count -eq 0 ]]; then
            echo "No release assets matched ${{ matrix.artifact_glob }}" >&2
            exit 1
          fi

          ls -lah release-assets

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - verify
      - build
    runs-on: ubuntu-22.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          ls -lah

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Aether v${{ needs.verify.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.verify.outputs.prerelease == 'true' }}
          files: |
            release-assets/*
