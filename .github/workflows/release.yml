name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag and test
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate semantic version tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag ${tag} is not a supported semantic version tag" >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [[ "${tag}" != "${expected_tag}" ]]; then
            echo "Tag ${tag} does not match package.json version ${package_version}" >&2
            exit 1
          fi

          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          if [[ "${package_version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    name: Build ${{ matrix.label }} release assets
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            label: Linux
            artifact_glob: '*.AppImage'
          - runner: macos-14
            platform: macos
            label: macOS
            artifact_glob: '*.dmg'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s globstar nullglob
          files=(out/make/**/${{ matrix.artifact_glob }})

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets matched ${{ matrix.artifact_glob }}" >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            cp "${file}" release-assets/
          done

          ls -lah release-assets

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - verify
      - build
    runs-on: ubuntu-22.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          ls -lah

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Aether v${{ needs.verify.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.verify.outputs.prerelease == 'true' }}
          files: |
            release-assets/*
